<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>BLE log terminal</title>
  <style>
    :root {
      --teal: #0ea3bf;
      --teal-dark: #0b8ea8;
      --bg: #ebedf0;
      --panel: #f8fafb;
      --text: #111;
      --muted: #5e6a73;
    }
    * { box-sizing: border-box; }
    body { font-family: "Segoe UI", "Noto Sans SC", Arial, sans-serif; margin: 0; background: var(--bg); color: var(--text); }
    body > h2 { display: none; }
    .pageTitle { display: block; margin: 0; padding: 8px 16px; background: linear-gradient(180deg, var(--teal-dark), var(--teal)); color: #fff; font-size: 22px; font-weight: 700; letter-spacing: .2px; }
    .panel { background: var(--panel); border-top: 1px solid rgba(0,0,0,.1); padding: 12px; }
    .hint { color: var(--muted); margin: 0 0 10px; line-height: 1.4; font-size: 13px; }
    .controlGrid { display: grid; grid-template-columns: 1fr; gap: 8px; margin-bottom: 10px; }
    .row { margin: 0; }
    .label { font-weight: 600; margin-bottom: 4px; font-size: 13px; color: #23313c; }
    input[type="text"], select { padding: 10px 12px; width: 100%; border: 1px solid #ccd6dd; border-radius: 8px; background: #fff; }
    .actions { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; margin-top: 8px; }
    .formatOptions { display: inline-flex; align-items: center; gap: 8px; margin-left: 4px; color: #23313c; font-size: 13px; font-weight: 600; }
    .formatOptions label { display: inline-flex; align-items: center; gap: 4px; font-weight: 600; }
    .formatOptions input { margin: 0; }
    button { padding: 10px 14px; border: 0; border-radius: 8px; background: #111; color: #fff; font-weight: 700; letter-spacing: .2px; }
    button[disabled] { opacity: .55; }
    .subhint { color: var(--muted); font-size: 12px; line-height: 1.3; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    .deviceList { margin-top: 12px; border-top: 1px solid #d4dce2; }
    table { width: 100%; border-collapse: collapse; margin-top: 12px; }
    thead { display: none; }
    td { padding: 0; border: 0; }
    .deviceCard { background: #fff; border-bottom: 1px solid #d4dce2; padding: 12px; }
    .deviceHead { display: flex; justify-content: space-between; align-items: center; gap: 10px; }
    .nameLine { display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap; }
    .name { font-size: 24px; font-weight: 600; line-height: 1.1; }
    .mfgInline { color: #6f7a83; font-size: 12px; font-weight: 600; line-height: 1.2; }
    .meta { color: #54606a; font-size: 13px; font-weight: 700; margin-top: 2px; }
    .metrics { display: flex; gap: 14px; margin-top: 8px; font-size: 13px; align-items: center; }
    .connect { min-width: 132px; }
    .detailsCard { background: #fff; border-bottom: 1px solid #d4dce2; padding: 8px 12px 12px; }
    .sendCard { margin: 8px 0 0; padding: 10px 12px; background: #fff; border-top: 1px solid #d4dce2; border-bottom: 1px solid #d4dce2; }
    .sendRow { display: flex; align-items: center; gap: 8px; }
    .sendPrefix { font-weight: 700; color: #23313c; min-width: 24px; text-align: right; }
    .sendInput { flex: 1; }
    .sendHexOpt { display: inline-flex; align-items: center; gap: 4px; color: #23313c; font-size: 13px; font-weight: 700; white-space: nowrap; }
    .sendHexOpt input { margin: 0; }
    #log { white-space: pre-wrap; background: #0b1020; color: #d7e3ff; padding: 10px; border-radius: 0; margin: 0; width: 100%; max-width: 100%; min-height: 160px; overflow-y: auto; overflow-x: hidden; overflow-wrap: anywhere; word-break: break-word; touch-action: pan-y; overscroll-behavior-x: none; font-family: 'Consolas', 'Monaco', 'Courier New', monospace; font-size: 12px; }
    .btnSmall { padding: 8px 10px; margin: 0; font-size: 12px; border-radius: 8px; }
    .btnSmall[disabled] { opacity: 0.6; }
    details { margin: 0; }
    .svc { margin: 8px 0 10px; }
    .svcTitle { font-weight: 600; }
    .chip { display: inline-block; padding: 2px 6px; border: 1px solid #d0d8de; border-radius: 999px; margin-left: 6px; font-size: 12px; color: #44515b; }
    .err { color: #b00020; }
    .ok  { color: #0a7a2f; }
    @media (max-width: 760px) {
      .name { font-size: 18px; }
      .connect { min-width: 108px; padding: 8px 10px; }
      .metrics { font-size: 13px; }
    }
  </style>
</head>
<body>
  <h2 class="pageTitle">BLE log terminal</h2>
  <h2>BLE Connection (Web Bluetooth)</h2>

  <div class="actions">
    <button id="btnStart">CONNECT</button>
    <button id="btnStop" disabled style="display:none;">STOP</button>
    <button id="btnClear">CLEAR</button>
    <div class="formatOptions" role="radiogroup" aria-label="Format">
      <span>Format:</span>
      <label><input type="radio" name="notifyFormat" value="hex" /> Hex</label>
      <label><input type="radio" name="notifyFormat" value="text" checked /> Text</label>
    </div>
  </div>

  <table>
    <thead>
      <tr>
        <th>Name</th>
        <th>RSSI</th>
        <th>Last Seen</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>

  <div id="sendCard" class="sendCard" style="display:none;">
    <div class="sendRow">
      <span id="sendPrefix" class="sendPrefix">0x</span>
      <input id="sendInput" class="sendInput" type="text"/>
      <label class="sendHexOpt"><input id="sendHexMode" type="checkbox" checked /> Hex</label>
      <button id="btnSend" type="button">Send</button>
      <button id="btnClearLog" type="button">Clear Log</button>
    </div>
  </div>

  <div id="log"></div>

<script>
(() => {
  const $ = (id) => document.getElementById(id);
  const tbody = $("tbody");
  const logEl = $("log");
  const btnStart = $("btnStart");
  const btnStop = $("btnStop");
  const btnClear = $("btnClear");
  const notifyFormatInputs = Array.from(document.querySelectorAll('input[name="notifyFormat"]'));
  const btnCopyFlags = $("btnCopyFlags");
  const copyStatus = $("copyStatus");
  const rssiInput = $("rssiInput");
  const sendCard = $("sendCard");
  const sendPrefix = $("sendPrefix");
  const sendInput = $("sendInput");
  const sendHexMode = $("sendHexMode");
  const btnSend = $("btnSend");
  const btnClearLog = $("btnClearLog");

  // 只显示最近 10 秒出现过的设备（已连接设备不会被自动剔除）
  const MAX_AGE_MS = 10_000;
  // 刷新 UI 频率（排序 + 过期剔除）
  const REFRESH_MS = 500;

  /** @type {BluetoothLEScan|null} */
  let scan = null;
  /** @type {WebSocket|null} */
  let logWs = null;
  /** @type {number|null} */
  let wsConnectTimer = null;
  /** @type {number|null} */
  let wsReconnectTimer = null;
  let wsReconnectAttempt = 0;
  let wsUserDisabled = false;
  let wsBoundDeviceId = "";
  const LOG_DB_NAME = "ble_log_queue_db";
  const LOG_DB_VERSION = 1;
  const LOG_DB_STORE = "queue";
  const LOG_DB_BATCH_SIZE = 200;
  const MAX_WS_BUFFERED_AMOUNT = 512 * 1024;
  const PENDING_FLUSH_INTERVAL_MS = 150;
  const ACK_TIMEOUT_MS = 5000;
  /** @type {Promise<IDBDatabase>|null} */
  let logDbPromise = null;
  let pendingFlushInProgress = false;
  /** @type {number|null} */
  let pendingFlushTimer = null;
  let replayActive = false;
  let replayTotalTarget = 0;
  let replayAckedTotal = 0;
  let inflightQid = 0;
  let inflightDeviceId = "";
  let inflightSentAtMs = 0;

  /** @type {number|null} */
  let refreshTimer = null;

  // 用 device.id 做“唯一键”（不显示在表格里）
  const rows = new Map();
  const NUS_SERVICE_UUID = "6e400001-b5a3-f393-e0a9-e50e24dcca9e";
  const NUS_WRITE_UUID = "6e400002-b5a3-f393-e0a9-e50e24dcca9e";
  const NUS_NOTIFY_MSG_UUID = "6e400003-b5a3-f393-e0a9-e50e24dcca9e";
  const NUS_NOTIFY_LOG_UUID = "6e400005-b5a3-f393-e0a9-e50e24dcca9e";
  const DEFAULT_OPTIONAL_SERVICES_RAW = NUS_SERVICE_UUID;
  const FILTER_COMPANY_ID_HEX = "0x1100";
  const PRECONNECT_ADVERTISEMENT_TIMEOUT_MS = 3000;
  const BLE_RECONNECT_BASE_DELAY_MS = 1000;
  const BLE_RECONNECT_MAX_DELAY_MS = 15000;
  const BLE_RECONNECT_MAX_ATTEMPTS = 8;
  const BLE_CONNECT_SETTLE_DELAY_MS = 300;
  const BLE_CONNECT_RETRY_DELAYS_MS = [0, 600, 1500];
  let activeEntry = null;

  // Web Bluetooth 允许的标准 service name（别名）在不同浏览器实现中可能有差异；
  // 这里给一些常见别名映射到 16-bit UUID，最终统一转成 128-bit 字符串。
  const NAME_TO_16BIT = new Map(Object.entries({
    generic_access: "1800",
    generic_attribute: "1801",
    immediate_alert: "1802",
    link_loss: "1803",
    tx_power: "1804",
    current_time: "1805",
    reference_time_update: "1806",
    next_dst_change: "1807",
    glucose: "1808",
    health_thermometer: "1809",
    device_information: "180A",
    heart_rate: "180D",
    phone_alert_status: "180E",
    battery_service: "180F",
    secure_dfu: "FE59",
    secure_dfu_service: "FE59",
    blood_pressure: "1810",
    alert_notification: "1811",
    human_interface_device: "1812",
    scan_parameters: "1813",
    running_speed_and_cadence: "1814",
    automation_io: "1815",
    cycling_speed_and_cadence: "1816",
    cycling_power: "1818",
    location_and_navigation: "1819",
    environmental_sensing: "181A",
    body_composition: "181B",
    user_data: "181C",
    weight_scale: "181D",
    continuous_glucose_monitoring: "181F"
  }));

  function getRssiThreshold() {
    const v = (rssiInput && rssiInput.value != null) ? String(rssiInput.value).trim() : "";
    const n = Number(v);
    if (!Number.isFinite(n)) return -999; // effectively no filter
    return n;
  }

  function hasName(name) {
    const s = String(name || "").trim();
    return s.length > 0;
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, (c) => ({
      "&": "&amp;",
      "<": "&lt;",
      ">": "&gt;",
      '"': "&quot;",
      "'": "&#39;"
    }[c]));
  }

  function ansiColorToCss(code) {
    const map = {
      30: "#8b949e", 31: "#ff0000", 32: "#00ff00", 33: "#ffff00",
      34: "#0000ff", 35: "#ff00ff", 36: "#00ffff", 37: "#ffffff",
      90: "#8b949e", 91: "#ff0000", 92: "#00ff00", 93: "#ffff00",
      94: "#0000ff", 95: "#ff00ff", 96: "#00ffff", 97: "#ffffff"
    };
    return map[code] || null;
  }

  function ansiToHtml(text) {
    const input = String(text || "");
    const re = /\u001b\[([0-9;]*)m/g;
    let idx = 0;
    let fg = null;
    let out = "";
    let m = null;
    while ((m = re.exec(input)) !== null) {
      const chunk = input.slice(idx, m.index);
      if (chunk) {
        const esc = escapeHtml(chunk);
        out += fg ? `<span style="color:${fg}">${esc}</span>` : esc;
      }
      const codes = (m[1] || "0").split(";").map((v) => Number(v)).filter((v) => Number.isFinite(v));
      if (codes.length === 0) {
        fg = null;
      } else {
        for (const c of codes) {
          if (c === 0 || c === 39) fg = null;
          else {
            const color = ansiColorToCss(c);
            if (color) fg = color;
          }
        }
      }
      idx = re.lastIndex;
    }
    const tail = input.slice(idx);
    if (tail) {
      const esc = escapeHtml(tail);
      out += fg ? `<span style="color:${fg}">${esc}</span>` : esc;
    }
    return out;
  }

  function appendLogLine(content, options = {}) {
    const { forceBreak = true } = options;
    const lineHtml = ansiToHtml(content);
    logEl.innerHTML += forceBreak ? `${lineHtml}<br/>` : lineHtml;
    logEl.scrollTop = logEl.scrollHeight;
    window.requestAnimationFrame(() => {
      revealClearLogButtonIfLogMaxed();
    });
  }

  function revealClearLogButtonIfLogMaxed() {
    if (!logEl || !btnClearLog) return;
    // 当日志区域开始内部滚动时，说明已达到最大高度（max-height）
    if (logEl.scrollHeight <= logEl.clientHeight + 1) return;

    const viewportH = window.innerHeight || document.documentElement.clientHeight;
    const rect = btnClearLog.getBoundingClientRect();
    const buttonHidden = rect.bottom > viewportH || rect.top < 0;
    if (!buttonHidden) return;

    btnClearLog.scrollIntoView({
      block: "nearest",
      inline: "nearest",
      behavior: "auto"
    });
  }

  function log(msg) {
    const t = new Date().toLocaleString();
    appendLogLine(`[${t}] ${msg}`);
  }

  function bleLog(content, options = {}) {
    appendLogLine(content, options);
    forwardLogToServer(String(content));
  }

  function isRemoteForwardablePayload(payload) {
    const msg = String(payload?.msg || "");
    if (!msg) return false;
    return !(
      msg.includes("Connecting to log server:") ||
      msg.includes("正在连接日志服务器") ||
      msg.includes("Log server connected") ||
      msg.includes("Log server disconnected") ||
      msg.includes("Starting cached log replay") ||
      msg.includes("Cached log replay completed") ||
      msg.includes("Page loaded") ||
      msg.includes("Connected:") ||
      msg.includes("Disconnected:")
    );
  }

  function normalizeLogContent(content) {
    // 保留 ANSI 颜色控制码，方便远程日志客户端渲染彩色日志。
    return String(content || "")
      .replace(/\r\n/g, "\n")
      .replace(/\r/g, "\n")
      .replace(/\n{2,}/g, "\n"); // 合并连续空行
  }

  function getActiveDeviceId() {
    return getEntryBroadcastName(activeEntry) || "";
  }

  function buildLogPayload(content) {
    const cleaned = normalizeLogContent(content);
    if (!cleaned) return null;
    return {
      ts: Math.floor(Date.now() / 1000), // UTC timestamp (seconds)
      msg: cleaned
    };
  }

  function canSendPayloadNow(deviceId) {
    if (!deviceId) return false;
    if (!logWs || logWs.readyState !== WebSocket.OPEN) return false;
    return wsBoundDeviceId === deviceId;
  }

  function sendPayloadNow(payload, deviceId) {
    if (!canSendPayloadNow(deviceId)) return false;
    if (typeof logWs.bufferedAmount === "number" && logWs.bufferedAmount > MAX_WS_BUFFERED_AMOUNT) return false;
    try {
      logWs.send(JSON.stringify(payload));
      return true;
    } catch (_) {
      return false;
    }
  }

  function openLogDb() {
    if (!("indexedDB" in window)) return Promise.reject(new Error("IndexedDB unavailable"));
    if (logDbPromise) return logDbPromise;

    logDbPromise = new Promise((resolve, reject) => {
      const req = window.indexedDB.open(LOG_DB_NAME, LOG_DB_VERSION);
      req.onupgradeneeded = () => {
        const db = req.result;
        if (!db.objectStoreNames.contains(LOG_DB_STORE)) {
          const store = db.createObjectStore(LOG_DB_STORE, { keyPath: "id", autoIncrement: true });
          store.createIndex("by_device_id", "deviceId", { unique: false });
        }
      };
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => {
        logDbPromise = null;
        reject(req.error || new Error("open db failed"));
      };
    });
    return logDbPromise;
  }

  function requestToPromise(req) {
    return new Promise((resolve, reject) => {
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error || new Error("indexeddb request failed"));
    });
  }

  function txDonePromise(tx) {
    return new Promise((resolve, reject) => {
      tx.oncomplete = () => resolve();
      tx.onabort = () => reject(tx.error || new Error("indexeddb tx abort"));
      tx.onerror = () => reject(tx.error || new Error("indexeddb tx error"));
    });
  }

  function resetPendingLogBuffer() {
    void clearQueuedPayloads();
  }

  async function clearQueuedPayloads() {
    try {
      const db = await openLogDb();
      const tx = db.transaction(LOG_DB_STORE, "readwrite");
      tx.objectStore(LOG_DB_STORE).clear();
      await txDonePromise(tx);
    } catch (_) {}
  }

  async function enqueuePendingPayload(payload, deviceId) {
    if (!deviceId || !payload) return;
    const db = await openLogDb();
    const tx = db.transaction(LOG_DB_STORE, "readwrite");
    const req = tx.objectStore(LOG_DB_STORE).add({ deviceId, payload });
    const id = await requestToPromise(req);
    await txDonePromise(tx);
    return Number(id || 0);
  }

  async function countQueuedPayloads(deviceId) {
    if (!deviceId) return 0;
    try {
      const db = await openLogDb();
      const tx = db.transaction(LOG_DB_STORE, "readonly");
      const idx = tx.objectStore(LOG_DB_STORE).index("by_device_id");
      const count = await requestToPromise(idx.count(IDBKeyRange.only(deviceId)));
      return Number(count || 0);
    } catch (_) {
      return 0;
    }
  }

  async function readQueuedPayloadBatch(deviceId, limit) {
    if (!deviceId || limit <= 0) return [];
    const db = await openLogDb();
    const tx = db.transaction(LOG_DB_STORE, "readonly");
    const idx = tx.objectStore(LOG_DB_STORE).index("by_device_id");
    const rows = [];
    await new Promise((resolve, reject) => {
      const req = idx.openCursor(IDBKeyRange.only(deviceId));
      req.onsuccess = () => {
        const cursor = req.result;
        if (!cursor || rows.length >= limit) {
          resolve();
          return;
        }
        rows.push({
          id: cursor.primaryKey,
          payload: cursor.value?.payload
        });
        cursor.continue();
      };
      req.onerror = () => reject(req.error || new Error("open cursor failed"));
    });
    return rows;
  }

  async function deleteQueuedPayloads(ids) {
    if (!ids || ids.length === 0) return;
    const db = await openLogDb();
    const tx = db.transaction(LOG_DB_STORE, "readwrite");
    const store = tx.objectStore(LOG_DB_STORE);
    for (const id of ids) store.delete(id);
    await txDonePromise(tx);
  }

  async function readQueuedPayloadById(id) {
    if (!id) return null;
    const db = await openLogDb();
    const tx = db.transaction(LOG_DB_STORE, "readonly");
    const req = tx.objectStore(LOG_DB_STORE).get(id);
    const row = await requestToPromise(req);
    if (!row) return null;
    return {
      id: Number(id),
      deviceId: row.deviceId,
      payload: row.payload
    };
  }

  async function deleteQueuedPayloadsUpTo(deviceId, maxQid) {
    if (!deviceId || !maxQid) return { deleted: 0, remaining: 0 };
    const db = await openLogDb();
    let deleted = 0;

    const tx = db.transaction(LOG_DB_STORE, "readwrite");
    const idx = tx.objectStore(LOG_DB_STORE).index("by_device_id");
    await new Promise((resolve, reject) => {
      const req = idx.openCursor(IDBKeyRange.only(deviceId));
      req.onsuccess = () => {
        const cursor = req.result;
        if (!cursor) {
          resolve();
          return;
        }
        const qid = Number(cursor.primaryKey || 0);
        if (qid > 0 && qid <= maxQid) {
          cursor.delete();
          deleted += 1;
        }
        cursor.continue();
      };
      req.onerror = () => reject(req.error || new Error("ack delete cursor failed"));
    });
    await txDonePromise(tx);
    const remaining = await countQueuedPayloads(deviceId);
    return { deleted, remaining };
  }

  function clearPendingFlushTimer() {
    if (pendingFlushTimer !== null) {
      window.clearInterval(pendingFlushTimer);
      pendingFlushTimer = null;
    }
  }

  function ensurePendingFlushTimer() {
    if (pendingFlushTimer !== null) return;
    pendingFlushTimer = window.setInterval(() => {
      const deviceId = getActiveDeviceId();
      if (!deviceId) return;
      void flushPendingPayloads(deviceId);
    }, PENDING_FLUSH_INTERVAL_MS);
  }

  function resetInflightState() {
    inflightQid = 0;
    inflightDeviceId = "";
    inflightSentAtMs = 0;
  }

  function buildLogEnvelope(qid, payload) {
    return {
      type: "log",
      qid,
      ts: payload.ts,
      msg: payload.msg
    };
  }

  function markReplayAcked(ackedCount) {
    if (!replayActive || ackedCount <= 0) return;
    replayAckedTotal += ackedCount;
    if (replayAckedTotal >= replayTotalTarget) {
      const done = replayAckedTotal;
      replayActive = false;
      replayTotalTarget = 0;
      replayAckedTotal = 0;
      log(`Cached log replay completed. Replayed ${done} log(s).`);
    }
  }

  async function flushPendingPayloads(deviceId) {
    if (!deviceId) return { sent: 0, remaining: 0 };
    if (!canSendPayloadNow(deviceId)) return { sent: 0, remaining: await countQueuedPayloads(deviceId) };
    if (pendingFlushInProgress) return { sent: 0, remaining: await countQueuedPayloads(deviceId) };

    pendingFlushInProgress = true;
    let sent = 0;
    try {
      // 单飞模式：同一时刻最多一个未 ACK 的 qid，避免重复发送与乱序确认
      if (inflightQid > 0 && inflightDeviceId === deviceId) {
        const now = Date.now();
        if ((now - inflightSentAtMs) < ACK_TIMEOUT_MS) {
          return { sent: 0, remaining: await countQueuedPayloads(deviceId) };
        }
        const inflightRow = await readQueuedPayloadById(inflightQid);
        if (!inflightRow || inflightRow.deviceId !== deviceId || !inflightRow.payload) {
          resetInflightState();
          return { sent: 0, remaining: await countQueuedPayloads(deviceId) };
        }
        const retryEnvelope = buildLogEnvelope(inflightRow.id, inflightRow.payload);
        if (sendPayloadNow(retryEnvelope, deviceId)) {
          inflightSentAtMs = now;
          sent = 1;
        }
        return { sent, remaining: await countQueuedPayloads(deviceId) };
      }

      if (inflightQid > 0 && inflightDeviceId !== deviceId) {
        return { sent: 0, remaining: await countQueuedPayloads(deviceId) };
      }

      const batch = await readQueuedPayloadBatch(deviceId, 1);
      if (batch.length === 0) return { sent: 0, remaining: 0 };
      const item = batch[0];
      if (!item || item.id == null || !item.payload) {
        await deleteQueuedPayloads([item?.id].filter((v) => v != null));
        return { sent: 0, remaining: await countQueuedPayloads(deviceId) };
      }
      if (!isRemoteForwardablePayload(item.payload)) {
        await deleteQueuedPayloads([item.id]);
        resetInflightState();
        return { sent: 0, remaining: await countQueuedPayloads(deviceId) };
      }

      const envelope = buildLogEnvelope(Number(item.id), item.payload);
      if (sendPayloadNow(envelope, deviceId)) {
        inflightQid = Number(item.id);
        inflightDeviceId = deviceId;
        inflightSentAtMs = Date.now();
        sent = 1;
      }
      return { sent, remaining: await countQueuedPayloads(deviceId) };
    } catch (_) {
      const remaining = await countQueuedPayloads(deviceId);
      return { sent, remaining };
    } finally {
      pendingFlushInProgress = false;
    }
  }

  function beginReplay(total) {
    replayActive = total > 0;
    replayTotalTarget = total > 0 ? total : 0;
    replayAckedTotal = 0;
    if (replayActive) {
      log(`Starting cached log replay. ${total} log(s) pending.`);
    }
  }

  async function handleServerAck(qid, deviceId) {
    const ackQid = Number(qid || 0);
    if (!deviceId || ackQid <= 0) return;

    const res = await deleteQueuedPayloadsUpTo(deviceId, ackQid);
    if (res.deleted > 0) markReplayAcked(res.deleted);

    if (inflightQid > 0 && inflightDeviceId === deviceId && ackQid >= inflightQid) {
      resetInflightState();
    }

    if (res.remaining > 0) ensurePendingFlushTimer();
    else clearPendingFlushTimer();

    await flushPendingPayloads(deviceId);
  }

  function forwardLogToServer(content) {
    if (wsUserDisabled) return;
    const payload = buildLogPayload(content);
    if (!payload) return;
    const deviceId = getActiveDeviceId();
    if (!deviceId) return;
    void enqueuePendingPayload(payload, deviceId)
      .then(() => flushPendingPayloads(deviceId))
      .then((state) => {
        if (!state) return;
        if (state.remaining > 0) ensurePendingFlushTimer();
      })
      .catch(() => {});
  }

  function dataViewToAscii(dataView) {
    if (!dataView) return "";
    const bytes = new Uint8Array(dataView.buffer, dataView.byteOffset, dataView.byteLength);
    return Array.from(bytes).map((b) => String.fromCharCode(b)).join("");
  }

  function parseManufacturerData(dataMap) {
    const list = [];
    if (!dataMap || typeof dataMap.forEach !== "function") return list;
    dataMap.forEach((dataView, companyId) => {
      const companyIdHex = `0x${Number(companyId).toString(16).padStart(4, "0")}`;
      list.push({
        companyId: companyIdHex,
        dataAscii: dataViewToAscii(dataView)
      });
    });
    return list;
  }

  function getEntryManufacturerText(entry) {
    return (entry?.manufacturerData || []).map((item) => item.dataAscii).filter(Boolean).join("");
  }

  function getEntryBroadcastName(entry) {
    const name = entry?.grantedDevice?.name || entry?.advDevice?.name || entry?.name || "";
    const normalized = String(name).trim();
    if (!normalized || normalized === "(Unnamed)") return "";
    return normalized;
  }

  function inferModelFromBroadcastName(name) {
    const normalized = String(name || "").trim();
    if (normalized.startsWith("AB_A")) return "G30";
    if (normalized.startsWith("AB_G")) return "G40";
    return "";
  }

  function getEntryModel(entry) {
    const manufacturerModel = getEntryManufacturerText(entry);
    if (manufacturerModel) return manufacturerModel;
    return inferModelFromBroadcastName(getEntryBroadcastName(entry));
  }

  function clearWsReconnectTimer() {
    if (wsReconnectTimer !== null) {
      window.clearTimeout(wsReconnectTimer);
      wsReconnectTimer = null;
    }
  }

  function clearWsConnectTimer() {
    if (wsConnectTimer !== null) {
      window.clearTimeout(wsConnectTimer);
      wsConnectTimer = null;
    }
  }

  function canConnectLogServer() {
    if (wsUserDisabled) return false;
    if (!activeEntry?.connected) return false;
    return !!getEntryBroadcastName(activeEntry);
  }

  function scheduleWsReconnect(reason) {
    if (!canConnectLogServer()) return;
    if (logWs && (logWs.readyState === WebSocket.OPEN || logWs.readyState === WebSocket.CONNECTING)) return;
    if (wsReconnectTimer !== null) return;

    const delay = Math.min(1000 * (2 ** wsReconnectAttempt), 15000);
    wsReconnectAttempt = Math.min(wsReconnectAttempt + 1, 6);
    wsReconnectTimer = window.setTimeout(() => {
      wsReconnectTimer = null;
      connectLogServer({ fromAuto: true, silent: true });
    }, delay);
    log(`Log server disconnected. Reconnecting in ${Math.floor(delay / 1000)}s (${reason}).`);
  }

  function reconnectLogServerIfNeeded(reason) {
    if (document.visibilityState === "hidden") return;
    if (!canConnectLogServer()) return;
    if (logWs && (logWs.readyState === WebSocket.OPEN || logWs.readyState === WebSocket.CONNECTING)) return;
    clearWsReconnectTimer();
    connectLogServer({ fromAuto: true, silent: true });
    log(`Page resumed. Reconnecting to log server (${reason}).`);
  }

  function setServerUiState(state) {
    // 日志服务器连接完全自动进行，不再显示服务器连接 UI。
  }

  function disconnectLogServer(options = {}) {
    const { userAction = false } = options;
    if (userAction) wsUserDisabled = true;
    clearWsConnectTimer();
    clearWsReconnectTimer();
    clearPendingFlushTimer();
    resetInflightState();
    if (logWs) {
      try { logWs.onopen = null; logWs.onclose = null; logWs.onerror = null; logWs.onmessage = null; } catch (_) {}
      try { logWs.close(); } catch (_) {}
    }
    logWs = null;
    wsBoundDeviceId = "";
    setServerUiState("idle");
  }

  function connectLogServer(options = {}) {
    const { fromAuto = false, silent = false } = options;
    wsUserDisabled = false;

    if (!activeEntry?.connected) {
      if (!silent) log("Log server connection failed: connect a BLE device first.");
      return false;
    }

    const broadcastName = getEntryBroadcastName(activeEntry);
    if (!broadcastName) {
      if (!silent) log("Log server connection failed: current device has no available BLE advertised name.");
      return false;
    }

    if (logWs && logWs.readyState === WebSocket.OPEN) return true;
    if (logWs && logWs.readyState === WebSocket.CONNECTING) return true;

    const url = `wss://ws-server.wszgdhz.com/ws/log?token=CHANGE_ME_TOKEN&device_id=${encodeURIComponent(broadcastName)}`;

    disconnectLogServer();
    wsBoundDeviceId = broadcastName;
    setServerUiState("connecting");
    if (!silent) log(`Connecting to log server: ${url}`);

    let ws = null;
    try {
      ws = new WebSocket(url);
    } catch (e) {
      wsBoundDeviceId = "";
      log(`WebSocket creation failed: ${e?.message || e}`);
      setServerUiState("idle");
      if (fromAuto) scheduleWsReconnect("create-failed");
      return false;
    }

    logWs = ws;
    clearWsConnectTimer();
    wsConnectTimer = window.setTimeout(() => {
      if (logWs !== ws) return;
      log("Connection timed out. Please check whether the server supports the protocol/port.");
      disconnectLogServer();
      scheduleWsReconnect("timeout");
    }, 10000);

    ws.onopen = () => {
      if (logWs !== ws) return;
      clearWsConnectTimer();
      clearWsReconnectTimer();
      wsReconnectAttempt = 0;
      resetInflightState();
      setServerUiState("connected");
      wsBoundDeviceId = broadcastName;
      log("Log server connected.");
      void countQueuedPayloads(broadcastName)
        .then((total) => {
          beginReplay(total);
          clearPendingFlushTimer();
          return flushPendingPayloads(broadcastName);
        })
        .then((state) => {
          if (!state) return;
          if (state.remaining > 0) ensurePendingFlushTimer();
        });
    };

    ws.onmessage = (event) => {
      if (logWs !== ws) return;
      let data = null;
      try {
        data = JSON.parse(String(event.data || ""));
      } catch (_) {
        return;
      }
      if (!data) return;
      if (data.type === "ack") {
        void handleServerAck(data.qid, wsBoundDeviceId);
        return;
      }
      if (data.type === "send") {
        if (data.device_id && String(data.device_id) !== wsBoundDeviceId) return;
        const msg = String(data.msg ?? "");
        if (!msg) return;
        const encode = String(data.encode || "text").toLowerCase();
        const displayMsg = encode === "hex" ? `0x${msg}` : msg;
        const t = new Date().toLocaleString();
        appendLogLine(`[${t}] BLE Send: ${displayMsg}`);
        void sendServerMessageToBle({ msg, encode });
      }
    };

    ws.onerror = () => {
      if (logWs !== ws) return;
      log("Log server connection failed (onerror).");
      disconnectLogServer();
      scheduleWsReconnect("onerror");
    };

    ws.onclose = () => {
      if (logWs !== ws) return;
      clearWsConnectTimer();
      clearPendingFlushTimer();
      resetInflightState();
      logWs = null;
      wsBoundDeviceId = "";
      setServerUiState("idle");
      log("Log server disconnected.");
      scheduleWsReconnect("closed");
    };
    return true;
  }

  function bindNotifyListener(ch) {
    ch.addEventListener("characteristicvaluechanged", (event) => {
      const dv = event.target.value;
      const bytes = new Uint8Array(dv.buffer, dv.byteOffset, dv.byteLength);
      const mode = getNotifyFormatValue() === "text" ? "text" : "hex";
      if (mode === "hex") {
        const hex = Array.from(bytes).map((b) => b.toString(16).padStart(2, "0")).join(" ");
        bleLog(hex);
        return;
      }
      let text = "";
      try {
        text = new TextDecoder().decode(bytes);
      } catch (_) {
        text = "";
      }
      bleLog(text, { forceBreak: false });
    });
  }

  function updateNotifyOptionsVisibility(entry) {
    // 通知默认自动启用，界面不再显示通知选项。
  }

  function updateSendCardVisibility(entry) {
    const canSend = !!entry?.connected && !!entry?.nusWriteChar;
    if (sendCard) sendCard.style.display = canSend ? "" : "none";
  }

  function updateServerCardVisibility(entry) {
    if (!entry?.connected) disconnectLogServer();
  }

  function updateLogVisibility(entry) {
    const shouldShow = !!entry?.connected;
    if (logEl) logEl.style.display = shouldShow ? "" : "none";
    if (!shouldShow) {
      if (logEl) logEl.style.height = "";
      return;
    }
    window.requestAnimationFrame(() => {
      positionSendCardAtViewportTop();
    });
  }

  function positionSendCardAtViewportTop() {
    if (!sendCard || sendCard.style.display === "none" || !logEl || logEl.style.display === "none") return;

    // 先给日志框一个足够高度，让页面有滚动空间可以把发送框顶到视窗顶部。
    const viewportH = window.innerHeight || document.documentElement.clientHeight;
    logEl.style.height = `${Math.max(160, viewportH)}px`;

    sendCard.scrollIntoView({ block: "start", inline: "nearest", behavior: "auto" });

    window.requestAnimationFrame(() => {
      resizeLogToViewportBottom();
      sendCard.scrollIntoView({ block: "start", inline: "nearest", behavior: "auto" });
    });
  }

  function resizeLogToViewportBottom() {
    if (!logEl || logEl.style.display === "none") return;
    const rect = logEl.getBoundingClientRect();
    const viewportH = window.innerHeight || document.documentElement.clientHeight;
    const bottomPadding = 0;
    const h = Math.max(160, Math.floor(viewportH - rect.top - bottomPadding));
    logEl.style.height = `${h}px`;
  }

  function updateDataFormatUI() {
    updateSendFormatUI();
  }

  function updateSendFormatUI() {
    const isHex = !!sendHexMode?.checked;
    if (sendPrefix) sendPrefix.style.display = isHex ? "" : "none";
    if (sendInput) sendInput.placeholder = isHex ? "Enter hex bytes" : "Enter text";
  }

  function getNotifyFormatValue() {
    return notifyFormatInputs.find((input) => input.checked)?.value === "hex" ? "hex" : "text";
  }

  function parseHexInputToBytes(hexText) {
    const raw = String(hexText || "").replace(/\s+/g, "");
    if (raw.length === 0) return new Uint8Array();
    if (!/^[0-9a-fA-F]+$/.test(raw)) {
      throw new Error("Hex input contains non-hex characters.");
    }
    if (raw.length % 2 !== 0) {
      throw new Error("Hex input length must be even.");
    }
    const out = new Uint8Array(raw.length / 2);
    for (let i = 0; i < raw.length; i += 2) {
      out[i / 2] = parseInt(raw.slice(i, i + 2), 16);
    }
    return out;
  }

  async function sendMessage() {
    const entry = activeEntry;
    if (!entry?.connected || !entry?.nusWriteChar) {
      log("Send failed: current device is not connected or does not support message sending.");
      return;
    }
    const isHex = !!sendHexMode?.checked;
    const input = sendInput?.value ?? "";
    let bytes = null;
    try {
      bytes = isHex ? parseHexInputToBytes(input) : new TextEncoder().encode(input);
    } catch (e) {
      log(`Send failed: ${e?.message || e}`);
      return;
    }

    try {
      const ch = entry.nusWriteChar;
      if (typeof ch.writeValueWithoutResponse === "function") {
        await ch.writeValueWithoutResponse(bytes);
      } else {
        await ch.writeValue(bytes);
      }
      log(`Sent ${bytes.byteLength} byte(s).`);
    } catch (e) {
      log(`Send failed: ${e?.message || e}`);
    }
  }

  async function writeBytesToBle(entry, bytes) {
    if (!entry?.connected || !entry?.nusWriteChar) {
      throw new Error("current device is not connected or does not support message sending");
    }
    const ch = entry.nusWriteChar;
    if (typeof ch.writeValueWithoutResponse === "function") {
      await ch.writeValueWithoutResponse(bytes);
      return;
    }
    await ch.writeValue(bytes);
  }

  async function sendServerMessageToBle({ msg, encode }) {
    const entry = activeEntry;
    const model = getEntryModel(entry);
    if (model !== "G30") return;

    let bytes = null;
    try {
      bytes = encode === "hex" ? parseHexInputToBytes(msg) : new TextEncoder().encode(msg);
      await writeBytesToBle(entry, bytes);
    } catch (e) {
      log(`BLE Send failed: ${e?.message || e}`);
    }
  }

  async function setNotifyState(entry, uuid, shouldEnable) {
    const key = uuid.toLowerCase();
    if (!entry.nusNotifyEnabled) entry.nusNotifyEnabled = new Set();
    if (!entry.nusNotifyBound) entry.nusNotifyBound = new Set();
    const ch = entry.nusNotifyChars.get(key);
    if (!ch) return;
    if (shouldEnable) {
      if (entry.nusNotifyEnabled.has(key)) return;
      await ch.startNotifications();
      if (!entry.nusNotifyBound.has(key)) {
        bindNotifyListener(ch);
        entry.nusNotifyBound.add(key);
      }
      entry.nusNotifyEnabled.add(key);
      return;
    }
    if (!entry.nusNotifyEnabled.has(key)) return;
    await ch.stopNotifications();
    entry.nusNotifyEnabled.delete(key);
  }

  async function applySelectedNusNotify(entry) {
    if (!entry?.connected) return;
    await setNotifyState(entry, NUS_NOTIFY_MSG_UUID, true);
    await setNotifyState(entry, NUS_NOTIFY_LOG_UUID, true);
  }

  function setCopyStatus(msg, ok) {
    if (!copyStatus) return;
    copyStatus.textContent = msg;
    copyStatus.className = ok ? "subhint ok" : "subhint err";
    window.setTimeout(() => {
      if (copyStatus) copyStatus.textContent = "";
      if (copyStatus) copyStatus.className = "subhint";
    }, 2000);
  }

  function ensureRefreshTimer() {
    if (refreshTimer !== null) return;
    refreshTimer = window.setInterval(refreshView, REFRESH_MS);
  }

  function setButtonState(entry, state) {
    const btn = entry.tr?.querySelector("button.connect");
    const badge = entry.tr?.querySelector(".status");
    if (!btn || !badge) return;

    if (state === "idle") {
      btn.disabled = false;
      btn.textContent = "CONNECT";
      badge.textContent = "";
      badge.className = "chip status";
    } else if (state === "connecting") {
      btn.disabled = true;
      btn.textContent = "CONNECTING";
      badge.textContent = "CONNECTING";
      badge.className = "chip status";
    } else if (state === "connected") {
      btn.disabled = false;
      btn.textContent = "DISCONNECT";
      badge.textContent = "CONNECTED";
      badge.className = "chip status ok";
    }
  }

  function ensureRows(entry) {
    if (entry.tr) return;

    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td class="name"></td>
      <td class="mono rssi"></td>
      <td class="mono last"></td>
      <td>
        <button class="btnSmall connect">CONNECT</button>
        <span class="chip status"></span>
      </td>
    `;

    const detailsTr = document.createElement("tr");
    detailsTr.style.display = "none";
    detailsTr.innerHTML = `
      <td colspan="4">
        <details>
          <summary>Service / Characteristic</summary>
          <div class="detailBody">(Not connected)</div>
        </details>
      </td>
    `;

    entry.tr = tr;
    entry.detailsTr = detailsTr;

    tr.querySelector("button.connect").addEventListener("click", async () => {
      if (entry.connected) {
        await disconnectEntry(entry);
      } else {
        await connectEntry(entry);
      }
    });

    tbody.appendChild(tr);
    tbody.appendChild(detailsTr);
  }

  function upsertRow({ name, id, rssi, advDevice, manufacturerData }) {
    const now = Date.now();
    let entry = rows.get(id);

    if (!entry) {
      entry = {
        id,
        tr: null, detailsTr: null,
        lastSeenMs: now,
        rssi: undefined,
        name: "",
        advDevice: null,
        grantedDevice: null,
        gattServer: null,
        connected: false,
        connecting: false,
        manufacturerData: [],
        advertisementDevice: null,
        advertisementHandler: null,
        nusWriteChar: null,
        nusNotifyChars: new Map(),
        nusNotifyEnabled: new Set(),
        nusNotifyBound: new Set(),
        manualDisconnect: false,
        bleReconnectTimer: null,
        bleReconnectAttempt: 0,
        gattDisconnectDevice: null,
        gattDisconnectHandler: null
      };
      rows.set(id, entry);
    }

    ensureRows(entry);

    entry.lastSeenMs = now;
    entry.name = name || "(Unnamed)";
    if (typeof rssi === "number") entry.rssi = rssi;
    if (advDevice) entry.advDevice = advDevice;
    if (Array.isArray(manufacturerData)) entry.manufacturerData = manufacturerData;

    entry.tr.querySelector(".name").textContent = entry.name;
    const rssiEl = entry.tr.querySelector(".rssi");
    if (rssiEl) {
      if (typeof entry.rssi === "number") {
        rssiEl.textContent = `${entry.rssi} dBm`;
        rssiEl.style.display = "";
      } else {
        rssiEl.textContent = "";
        rssiEl.style.display = "none";
      }
    }
    entry.tr.querySelector(".last").textContent = `last seen: ${new Date(now).toLocaleTimeString()}`;
    const mfgEl = entry.tr.querySelector(".mfgInline");
    const mfgText = (entry.manufacturerData || []).map((item) => item.dataAscii).filter(Boolean).join("");
    const inferredModel = inferModelFromBroadcastName(entry.name);
    if (mfgEl) {
      if (mfgText) {
        mfgEl.textContent = mfgText;
        mfgEl.style.display = "";
      } else if (inferredModel) {
        mfgEl.textContent = inferredModel;
        mfgEl.style.display = "";
      } else {
        mfgEl.textContent = "Model: Unknown";
        mfgEl.style.display = "";
      }
    }

    refreshView();
  }

  function refreshView() {
    const now = Date.now();

    // 1) 剔除 10 秒未出现过的设备（已连接的不剔除）
    for (const [id, entry] of rows.entries()) {
      if (entry.connected || entry.connecting || entry.bleReconnectTimer !== null) continue;
      if (now - entry.lastSeenMs > MAX_AGE_MS) {
        entry.tr?.remove();
        entry.detailsTr?.remove();
        rows.delete(id);
      }
    }

    // 2) 按 RSSI 自动排序（RSSI 越大越靠前）
    const entries = Array.from(rows.values());
    entries.sort((a, b) => {
      const ar = (typeof a.rssi === "number") ? a.rssi : -Infinity;
      const br = (typeof b.rssi === "number") ? b.rssi : -Infinity;
      if (br !== ar) return br - ar;
      return b.lastSeenMs - a.lastSeenMs;
    });

    // 3) 重新按顺序挂载
    for (const e of entries) {
      tbody.appendChild(e.tr);
      tbody.appendChild(e.detailsTr);
    }
  }

  function clearTable() {
    for (const entry of rows.values()) {
      entry.manualDisconnect = true;
      clearBleReconnectTimer(entry);
      stopWatchingEntryAdvertisements(entry);
      if (entry.gattDisconnectDevice && entry.gattDisconnectHandler) {
        try {
          entry.gattDisconnectDevice.removeEventListener("gattserverdisconnected", entry.gattDisconnectHandler);
        } catch (_) {}
      }
      entry.gattDisconnectDevice = null;
      entry.gattDisconnectHandler = null;
      try { entry.gattServer?.device?.gatt?.disconnect(); } catch (_) {}
      try { entry.grantedDevice?.gatt?.disconnect(); } catch (_) {}
    }
    rows.clear();
    tbody.innerHTML = "";
    activeEntry = null;
    resetPendingLogBuffer();
    disconnectLogServer();
    updateServerCardVisibility(null);
    updateNotifyOptionsVisibility(null);
    updateSendCardVisibility(null);
    updateLogVisibility(null);
    log("Device list cleared. Attempted to disconnect all devices.");
  }

  function focusOnEntry(keepEntry) {
    for (const [id, entry] of rows.entries()) {
      if (entry === keepEntry) continue;
      stopWatchingEntryAdvertisements(entry);
      entry.tr?.remove();
      entry.detailsTr?.remove();
      rows.delete(id);
    }
    // Ensure the kept entry is visible and at top
    if (keepEntry?.tr) tbody.appendChild(keepEntry.tr);
    if (keepEntry?.detailsTr) tbody.appendChild(keepEntry.detailsTr);
  }

  function sleep(ms) {
    return new Promise((resolve) => window.setTimeout(resolve, ms));
  }

  function isTransientBleConnectError(error) {
    const msg = String(error?.message || error || "");
    return /Connection attempt failed|Connection Error|GATT Server is disconnected|NetworkError/i.test(msg);
  }

  async function connectGattWithRetry(device) {
    let lastError = null;
    for (let i = 0; i < BLE_CONNECT_RETRY_DELAYS_MS.length; i += 1) {
      const delay = BLE_CONNECT_RETRY_DELAYS_MS[i];
      if (delay > 0) await sleep(delay);

      try {
        return await device.gatt.connect();
      } catch (e) {
        lastError = e;
        if (!isTransientBleConnectError(e) || i === BLE_CONNECT_RETRY_DELAYS_MS.length - 1) {
          throw e;
        }
        log(`BLE connect attempt ${i + 1} failed: ${e?.message || e}. Retrying...`);
      }
    }
    throw lastError;
  }

  function clearBleReconnectTimer(entry) {
    if (!entry || entry.bleReconnectTimer === null) return;
    window.clearTimeout(entry.bleReconnectTimer);
    entry.bleReconnectTimer = null;
  }

  function resetEntryBleState(entry) {
    entry.connected = false;
    entry.connecting = false;
    entry.gattServer = null;
    entry.nusWriteChar = null;
    entry.nusNotifyChars = new Map();
    entry.nusNotifyEnabled = new Set();
    entry.nusNotifyBound = new Set();
  }

  function cleanupDisconnectedEntry(entry) {
    resetEntryBleState(entry);
    stopWatchingEntryAdvertisements(entry);
    setButtonState(entry, "idle");
    if (activeEntry === entry) {
      activeEntry = null;
      disconnectLogServer();
      updateServerCardVisibility(null);
      updateNotifyOptionsVisibility(null);
      updateSendCardVisibility(null);
      updateLogVisibility(null);
    }
  }

  function bindGattDisconnectHandler(entry, device) {
    if (entry.gattDisconnectDevice === device && entry.gattDisconnectHandler) return;
    if (entry.gattDisconnectDevice && entry.gattDisconnectHandler) {
      try {
        entry.gattDisconnectDevice.removeEventListener("gattserverdisconnected", entry.gattDisconnectHandler);
      } catch (_) {}
    }

    entry.gattDisconnectDevice = device;
    entry.gattDisconnectHandler = () => {
      if (entry.manualDisconnect) return;

      cleanupDisconnectedEntry(entry);
      log(`Device disconnected: ${device.name || "(Unnamed)"}`);
      scheduleBleReconnect(entry, "unexpected-disconnect");
    };

    device.addEventListener("gattserverdisconnected", entry.gattDisconnectHandler);
  }

  function scheduleBleReconnect(entry, reason) {
    if (!entry || entry.manualDisconnect) return;
    if (!entry.grantedDevice) return;
    if (entry.connected || entry.connecting) return;
    if (entry.bleReconnectTimer !== null) return;

    if (entry.bleReconnectAttempt >= BLE_RECONNECT_MAX_ATTEMPTS) {
      setButtonState(entry, "idle");
      log(`BLE auto reconnect stopped after ${BLE_RECONNECT_MAX_ATTEMPTS} attempt(s).`);
      return;
    }

    const delay = Math.min(
      BLE_RECONNECT_BASE_DELAY_MS * (2 ** entry.bleReconnectAttempt),
      BLE_RECONNECT_MAX_DELAY_MS
    );
    entry.bleReconnectAttempt += 1;
    setButtonState(entry, "connecting");
    log(`BLE disconnected unexpectedly. Reconnecting in ${Math.floor(delay / 1000)}s (${reason}).`);

    entry.bleReconnectTimer = window.setTimeout(() => {
      entry.bleReconnectTimer = null;
      if (entry.manualDisconnect || entry.connected || entry.connecting) return;
      void connectEntry(entry, entry.grantedDevice, { autoReconnect: true });
    }, delay);
  }

  function normalizeServiceToken(token) {
    // Return: null | { kind: 'name'|'uuid', value: string }
    const t = String(token || "").trim();
    if (!t) return null;

    // 128-bit UUID
    if (/^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$/.test(t)) {
      return { kind: "uuid", value: t.toLowerCase() };
    }

    // 0x180A or 180A
    let hex = t.toLowerCase();
    if (hex.startsWith("0x")) hex = hex.slice(2);
    if (/^[0-9a-f]{4}$/.test(hex)) {
      // Convert 16-bit -> 128-bit base UUID
      const full = `0000${hex}-0000-1000-8000-00805f9b34fb`;
      return { kind: "uuid", value: full };
    }

    // name alias
    const key = t.toLowerCase().replace(/\s+/g, "_");
    if (NAME_TO_16BIT.has(key)) {
      const h = NAME_TO_16BIT.get(key).toLowerCase();
      const full = `0000${h}-0000-1000-8000-00805f9b34fb`;
      return { kind: "uuid", value: full };
    }

    // As a fallback, let browser handle standard names if it supports them:
    // (some implementations accept strings like 'battery_service')
    return { kind: "name", value: key };
  }

  function getOptionalServices() {
    const raw = DEFAULT_OPTIONAL_SERVICES_RAW;
    const tokens = raw.split(",").map(s => s.trim()).filter(Boolean);
    const normalized = [];
    for (const tok of tokens) {
      const r = normalizeServiceToken(tok);
      if (!r) continue;
      normalized.push(r.value);
    }
    // de-dup
    return Array.from(new Set(normalized));
  }

  function getFilterCompanyIdentifier() {
    const raw = String(FILTER_COMPANY_ID_HEX || "").trim().toLowerCase();
    const hex = raw.startsWith("0x") ? raw.slice(2) : raw;
    const n = Number.parseInt(hex, 16);
    return Number.isFinite(n) ? n : null;
  }

  function buildDeviceRequestOptions(optionalServices, name = "") {
    const companyIdentifier = getFilterCompanyIdentifier();
    if (companyIdentifier == null) {
      throw new Error(`Invalid FILTER_COMPANY_ID_HEX: ${FILTER_COMPANY_ID_HEX}`);
    }

    const filter = {
      manufacturerData: [{ companyIdentifier }]
    };
    if (hasName(name) && name !== "(Unnamed)") {
      filter.name = name;
    }

    return {
      filters: [filter],
      optionalServices,
      optionalManufacturerData: [companyIdentifier]
    };
  }

  async function startScan() {
    if (!("bluetooth" in navigator)) {
      log("This browser does not support Web Bluetooth (navigator.bluetooth is unavailable).");
      return;
    }

    btnStart.disabled = true;
    try {
      const optionalServices = getOptionalServices();
      const device = await navigator.bluetooth.requestDevice({
        ...buildDeviceRequestOptions(optionalServices)
      });
      if (!hasName(device.name)) {
        log("Selected device has an empty name. Connection skipped.");
        return;
      }

      const manufacturerData = await captureSelectedDeviceManufacturerDataBestEffort(device);

      const entryId = device.id || device.name || "(unknown-id)";
      upsertRow({
        name: device.name,
        id: entryId,
        rssi: undefined,
        advDevice: device,
        manufacturerData
      });

      const entry = rows.get(entryId);
      if (!entry) {
        log("Connection failed: unable to create device entry.");
        return;
      }
      await connectEntry(entry, device);
      ensureRefreshTimer();
    } catch (e) {
      log("Device selection/connection failed: " + (e?.message || e));
    } finally {
      btnStart.disabled = false;
      if (btnStop) btnStop.disabled = true;
    }
  }

  function stopScan() {
    try { scan?.stop(); } catch (_) {}
    scan = null;

    navigator.bluetooth.removeEventListener("advertisementreceived", onAdv);
    btnStart.disabled = false;
    btnStop.disabled = true;

    ensureRefreshTimer();
    log("Scan stopped. The list will keep only devices seen in the last 10 seconds; connected devices will remain.");
  }

  function onAdv(event) {
    const dev = event.device;

    // 过滤掉“无名称”的设备
    const name = dev?.name;
    if (!hasName(name)) return;

    // RSSI 过滤：只显示大于阈值的设备
    const th = getRssiThreshold();
    const rssi = event.rssi;
    // 你的需求依赖 RSSI：rssi 缺失则不展示
    if (typeof rssi !== "number") return;
    if (rssi <= th) return;

    const manufacturerData = parseManufacturerData(event.manufacturerData);
    const hasTargetCompanyId = manufacturerData.some((item) => item.companyId === FILTER_COMPANY_ID_HEX);
    if (!hasTargetCompanyId) return;

    upsertRow({
      name,
      id: dev?.id || "(unknown-id)",
      rssi,
      advDevice: dev,
      manufacturerData
    });
  }

  async function connectEntry(entry, selectedDevice = null, options = {}) {
    const { autoReconnect = false } = options;
    if (!("bluetooth" in navigator)) {
      log("This browser does not support Web Bluetooth.");
      return;
    }
    if (entry.connecting) return;

    if (!autoReconnect) {
      entry.manualDisconnect = false;
      entry.bleReconnectAttempt = 0;
    }
    clearBleReconnectTimer(entry);
    entry.connecting = true;
    setButtonState(entry, "connecting");

    try {
      const optionalServices = getOptionalServices();
      if (optionalServices.length === 0) {
        log("Warning: optionalServices is empty. Services cannot be enumerated after connection.");
      }

      // 从“连接设备”入口进来时已完成选择；从设备卡片重连时再弹一次选择器。
      let device = selectedDevice;
      if (!device) {
        device = await navigator.bluetooth.requestDevice(
          buildDeviceRequestOptions(optionalServices, entry.name)
        );
      }

      entry.grantedDevice = device;
      entry.name = device.name || entry.name || "(Unnamed)";

      if (BLE_CONNECT_SETTLE_DELAY_MS > 0) {
        await sleep(BLE_CONNECT_SETTLE_DELAY_MS);
      }

      const server = await connectGattWithRetry(device);
      bindGattDisconnectHandler(entry, device);
      entry.gattServer = server;
      entry.connected = true;
      entry.connecting = false;
      entry.manualDisconnect = false;
      entry.bleReconnectAttempt = 0;
      setButtonState(entry, "connected");
      log(`Connected: ${device.name || "(Unnamed)"}`);

      // 连接成功后仅保留当前设备
      focusOnEntry(entry);
      activeEntry = entry;

      updateServerCardVisibility(entry);
      connectLogServer();
      await enumerateGATT(entry, server, optionalServices);
      updateNotifyOptionsVisibility(entry);
      updateSendCardVisibility(entry);
      updateLogVisibility(entry);
      await applySelectedNusNotify(entry);
    } catch (e) {
      entry.connecting = false;
      entry.connected = false;
      entry.gattServer = null;
      setButtonState(entry, "idle");
      showDetails(entry, `<span class="err">Connection/enumeration failed: ${escapeHtml(e?.message || e)}</span>`, true);
      log("Connection/enumeration failed: " + (e?.message || e));
      if (autoReconnect && !entry.manualDisconnect) {
        scheduleBleReconnect(entry, "connect-failed");
      }
    }
  }

  async function captureSelectedDeviceManufacturerDataBestEffort(device) {
    log("Reading ManufacturerData from device advertisements...");
    try {
      return await captureSelectedDeviceManufacturerData(device);
    } catch (e) {
      log(`ManufacturerData unavailable before connection: ${e?.message || e}`);
      return [];
    }
  }

  function captureSelectedDeviceManufacturerData(device) {
    if (!device || typeof device.watchAdvertisements !== "function") {
      return Promise.reject(new Error("This browser does not support reading ManufacturerData before connection."));
    }

    return new Promise((resolve, reject) => {
      let done = false;
      let timer = null;

      const cleanup = () => {
        try { device.removeEventListener("advertisementreceived", onAdvertisement); } catch (_) {}
        try {
          if (typeof device.unwatchAdvertisements === "function") device.unwatchAdvertisements();
        } catch (_) {}
        if (timer !== null) {
          window.clearTimeout(timer);
          timer = null;
        }
      };

      const finish = (manufacturerData, error) => {
        if (done) return;
        done = true;
        cleanup();
        if (error) {
          reject(error);
          return;
        }
        if (!manufacturerData || manufacturerData.length === 0) {
          reject(new Error(`Failed to read ${FILTER_COMPANY_ID_HEX} ManufacturerData before connection.`));
          return;
        }
        resolve(manufacturerData);
      };

      const onAdvertisement = (event) => {
        const manufacturerData = parseManufacturerData(event.manufacturerData);
        const targetManufacturerData = manufacturerData.filter((item) => item.companyId === FILTER_COMPANY_ID_HEX);
        if (targetManufacturerData.length === 0) return;
        finish(targetManufacturerData, null);
      };

      timer = window.setTimeout(() => {
        finish(null, new Error(`Reading ManufacturerData before connection timed out (${PRECONNECT_ADVERTISEMENT_TIMEOUT_MS}ms).`));
      }, PRECONNECT_ADVERTISEMENT_TIMEOUT_MS);

      device.addEventListener("advertisementreceived", onAdvertisement);
      Promise.resolve(device.watchAdvertisements()).catch((e) => {
        finish(null, e || new Error("Failed to start watchAdvertisements."));
      });
    });
  }

  function stopWatchingEntryAdvertisements(entry) {
    const device = entry?.advertisementDevice;
    const handler = entry?.advertisementHandler;
    if (device && handler) {
      try { device.removeEventListener("advertisementreceived", handler); } catch (_) {}
      try {
        if (typeof device.unwatchAdvertisements === "function") device.unwatchAdvertisements();
      } catch (_) {}
    }
    if (entry) {
      entry.advertisementDevice = null;
      entry.advertisementHandler = null;
    }
  }

  function removeEntryCard(entry) {
    if (!entry) return;
    clearBleReconnectTimer(entry);
    stopWatchingEntryAdvertisements(entry);
    if (entry.gattDisconnectDevice && entry.gattDisconnectHandler) {
      try {
        entry.gattDisconnectDevice.removeEventListener("gattserverdisconnected", entry.gattDisconnectHandler);
      } catch (_) {}
    }
    entry.gattDisconnectDevice = null;
    entry.gattDisconnectHandler = null;
    entry.tr?.remove();
    entry.detailsTr?.remove();
    for (const [id, rowEntry] of rows.entries()) {
      if (rowEntry === entry) rows.delete(id);
    }
  }

  async function disconnectEntry(entry) {
    entry.manualDisconnect = true;
    clearBleReconnectTimer(entry);
    try {
      const device = entry.grantedDevice || entry.advDevice || entry.gattServer?.device;
      if (device?.gatt?.connected) device.gatt.disconnect();
    } catch (_) {}

    cleanupDisconnectedEntry(entry);
    log(`Disconnected: ${entry.grantedDevice?.name || entry.name || "(Unnamed)"}`);
    removeEntryCard(entry);
  }

  function showDetails(entry, html, open) {
    if (!entry.detailsTr) return;
    const details = entry.detailsTr.querySelector("details");
    const body = entry.detailsTr.querySelector(".detailBody");
    if (body) body.innerHTML = html;
    entry.detailsTr.style.display = "";
    if (details && open) details.open = true;
  }

  async function enumerateGATT(entry, server, optionalServices) {
    try {
      // getPrimaryServices() 只会返回“本 origin 被允许访问”的 services
      const services = await server.getPrimaryServices();
      const allowNote = optionalServices?.length
        ? `<div class="subhint">Allowed services: <span class="mono">${optionalServices.length}</span>. Only services in this allowed range can be shown.</div>`
        : `<div class="subhint err">optionalServices is empty. The browser will block access to all services.</div>`;

      if (!services || services.length === 0) {
        entry.nusWriteChar = null;
        entry.nusNotifyChars = new Map();
        entry.nusNotifyEnabled = new Set();
        entry.nusNotifyBound = new Set();
        updateNotifyOptionsVisibility(entry);
        updateSendCardVisibility(entry);
        showDetails(entry, `${allowNote}<div>(No accessible Primary Services found)</div>`, false);
        return;
      }

      const parts = [allowNote];
      entry.nusWriteChar = null;
      entry.nusNotifyChars = new Map();
      entry.nusNotifyEnabled = new Set();
      entry.nusNotifyBound = new Set();
      for (const svc of services) {
        let chars = null;
        try {
          chars = await svc.getCharacteristics();
        } catch (e) {
          chars = null;
        }

        const svcUuid = svc.uuid;
        let svcBlock = `<div class="svc"><div class="svcTitle">Service: <span class="mono">${escapeHtml(svcUuid)}</span></div>`;
        if (!chars) {
          svcBlock += `<div class="err">Unable to read Characteristics. The service may be missing from optionalServices or restricted by the device.</div>`;
        } else if (chars.length === 0) {
          svcBlock += `<div>(No Characteristics)</div>`;
        } else {
          svcBlock += `<ul>`;
          for (const ch of chars) {
            const props = [];
            const p = ch.properties;
            if (p.read) props.push("read");
            if (p.write) props.push("write");
            if (p.writeWithoutResponse) props.push("writeWithoutResponse");
            if (p.notify) props.push("notify");
            if (p.indicate) props.push("indicate");
            if (p.authenticatedSignedWrites) props.push("signedWrites");

            const isNusService = (svcUuid.toLowerCase() === NUS_SERVICE_UUID);
            const isNusNotify = isNusService && !!p.notify;
            if (isNusService && ch.uuid.toLowerCase() === NUS_WRITE_UUID) {
              entry.nusWriteChar = ch;
            }
            if (isNusNotify) {
              entry.nusNotifyChars.set(ch.uuid.toLowerCase(), ch);
            }

            svcBlock += `<li>
              <span>Characteristic: <span class="mono">${escapeHtml(ch.uuid)}</span></span>
              <span class="chip">${escapeHtml(props.join(", ") || "no-props")}</span>
            </li>`;
          }
          svcBlock += `</ul>`;
        }
        svcBlock += `</div>`;
        parts.push(svcBlock);
      }

      showDetails(entry, parts.join(""), false);
      updateNotifyOptionsVisibility(entry);
      updateSendCardVisibility(entry);
    } catch (e) {
      showDetails(entry, `<span class="err">Enumeration failed: ${escapeHtml(e?.message || e)}</span>`, false);
      log("Service enumeration failed: " + (e?.message || e));
    }
  }

  // Override: scanner-like card UI
  function setButtonState(entry, state) {
    const btn = entry.tr?.querySelector("button.connect");
    const badge = entry.tr?.querySelector(".status");
    if (!btn || !badge) return;
    if (state === "idle") {
      btn.disabled = false;
      btn.textContent = "CONNECT";
      badge.textContent = "";
      badge.className = "chip status";
      badge.style.display = "";
      return;
    }
    if (state === "connecting") {
      btn.disabled = true;
      btn.textContent = "CONNECTING";
      badge.textContent = "CONNECTING";
      badge.className = "chip status";
      badge.style.display = "";
      return;
    }
    btn.disabled = false;
    btn.textContent = "DISCONNECT";
    badge.textContent = "";
    badge.className = "chip status ok";
    badge.style.display = "none";
  }

  // Override: render each device as a card-like row
  function ensureRows(entry) {
    if (entry.tr) return;
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td colspan="4">
        <div class="deviceCard">
          <div class="deviceHead">
            <div>
              <div class="nameLine">
                <span class="name"></span>
                <span class="mfgInline mono"></span>
              </div>
              <div class="meta mono last"></div>
              <div class="metrics">
                <span class="mono rssi"></span>
                <span class="chip status"></span>
              </div>
            </div>
            <button class="connect">CONNECT</button>
          </div>
        </div>
      </td>
    `;
    const detailsTr = document.createElement("tr");
    detailsTr.style.display = "none";
    detailsTr.innerHTML = `
      <td colspan="4" class="detailsCard">
        <details>
          <summary>Service / Characteristic</summary>
          <div class="detailBody">(Not connected)</div>
        </details>
      </td>
    `;
    entry.tr = tr;
    entry.detailsTr = detailsTr;
    tr.querySelector("button.connect").addEventListener("click", async () => {
      if (entry.connected) {
        await disconnectEntry(entry);
      } else {
        await connectEntry(entry);
      }
    });
    tbody.appendChild(tr);
    tbody.appendChild(detailsTr);
  }

  if (btnStart) btnStart.textContent = "CONNECT";
  if (btnStop) {
    btnStop.textContent = "STOP";
    btnStop.style.display = "none";
  }
  if (btnClear) btnClear.textContent = "CLEAR";
  updateDataFormatUI();
  for (const input of notifyFormatInputs) {
    input.addEventListener("change", () => {
      updateDataFormatUI();
    });
  }
  if (sendHexMode) {
    sendHexMode.addEventListener("change", () => {
      updateSendFormatUI();
    });
  }
  btnStart.addEventListener("click", startScan);
  if (btnStop) btnStop.addEventListener("click", stopScan);
  btnClear.addEventListener("click", clearTable);
  if (btnSend) {
    btnSend.addEventListener("click", async () => {
      await sendMessage();
    });
  }
  if (btnClearLog) {
    btnClearLog.addEventListener("click", () => {
      logEl.innerHTML = "";
    });
  }
  if (btnCopyFlags) {
    btnCopyFlags.addEventListener("click", async () => {
      const text = "chrome://flags/#enable-experimental-web-platform-features";
      try {
        if (navigator.clipboard && typeof navigator.clipboard.writeText === "function") {
          await navigator.clipboard.writeText(text);
        } else {
          const ta = document.createElement("textarea");
          ta.value = text;
          ta.setAttribute("readonly", "");
          ta.style.position = "absolute";
          ta.style.left = "-9999px";
          document.body.appendChild(ta);
          ta.select();
          document.execCommand("copy");
          ta.remove();
        }
        setCopyStatus("Copied", true);
      } catch (e) {
        setCopyStatus("Copy failed. Please copy manually.", false);
      }
    });
  }
  document.addEventListener("visibilitychange", () => {
    if (document.visibilityState === "visible") reconnectLogServerIfNeeded("visibilitychange");
  });
  window.addEventListener("focus", () => {
    reconnectLogServerIfNeeded("focus");
  });
  window.addEventListener("pageshow", () => {
    reconnectLogServerIfNeeded("pageshow");
  });
  window.addEventListener("online", () => {
    reconnectLogServerIfNeeded("online");
  });
  window.addEventListener("resize", () => {
    positionSendCardAtViewportTop();
  });

  updateServerCardVisibility(null);
  updateLogVisibility(null);
  setServerUiState("idle");
  log("Page loaded. Click CONNECT to select a device.");
})();
</script>
</body>
</html>
